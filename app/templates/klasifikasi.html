<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tealeafy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/klasifikasi.css') }}">
</head>
<body class="bg-klasifikasi">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg custom-nav fixed-top shadow-sm mx-auto mt-3">
        <div class="container-fluid">
            <a class="navbar-brand back-text" href="{{ url_for('main.index') }}">
                <i class="fa-solid fa-chevron-left me-2"></i> Kembali
            </a>
        </div>
    </nav>

    <!-- KLASIFIKASI SECTION -->
    <section id="klasifikasi-content" class="py-5">
        <div class="container mt-5 pt-5">
            <div class="text-center mb-5 mt-4">
                <h2 class="section-title">Analisis Daun Teh Berbasis Kecerdasan Buatan</h2>
                <p class="section-subtitle">Unggah gambar daun teh dalam format JPG, PNG, atau JPEG</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="upload-area shadow-sm" id="drop-area">
                        <label class="text-center cursor-pointer"> 
                            <i class="fa-solid fa-upload"></i>
                            <p id="file-name" class="mb-0">Klik untuk mengunggah gambar</p>
                            <img id="img-preview" class="d-none rounded shadow-sm" alt="Preview">
                        </label>
                    </div>

                    <div class="text-center mt-5">
                        <button class="btn btn-custom btn-lg px-5 shadow" id="btn-submit" disabled>
                            <i class="fa-solid fa-magnifying-glass me-2"></i> Klasifikasi Gambar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- POP UP SUMBER GAMBAR -->
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow custom-modal">
                <div class="modal-header border-0 px-4 pt-4">
                    <h5 class="modal-title modal-header-color" id="uploadModalLabel">Pilih Sumber Gambar</h5>
                    <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4 pb-4">
                    <div class="upload-option d-flex justify-content-between align-items-center py-3 custom-border-bottom cursor-pointer" id="opt-upload">
                        <span class="option-text">Unggah dari Perangkat</span>
                        <i class="fa-solid fa-upload"></i>
                    </div>
                    <div class="upload-option d-flex justify-content-between align-items-center py-3 cursor-pointer" id="opt-camera">
                        <span class="option-text">Ambil Foto</span>
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- POPUP KAMERA -->
    <div id="camera-container" class="camera-container d-none">
        <div class="camera-box">

            <video id="camera-stream" autoplay playsinline></video>

            <div class="camera-buttons">
                <button id="captureButton" class="btn-camera btn-capture">
                    Ambil Foto
                </button>

                <button id="cancelCameraButton" class="btn-camera btn-cancel">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <canvas id="camera-canvas" class="d-none"></canvas>
    <input type="file" id="fileElem" accept=".jpg,.jpeg,.png,image/*" class="d-none">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/klasifikasi.js') }}"></script>
</body>
</html>
